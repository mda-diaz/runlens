<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compare runs — RunLens</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      color: #111;
      font-size: 14px;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header a { color: #888; text-decoration: none; font-size: 13px; }
    header a:hover { color: #111; }
    header .sep { color: #ddd; }
    header h1 { font-size: 16px; font-weight: 600; }

    main { padding: 32px; max-width: 1100px; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      margin-bottom: 12px;
    }

    /* ── Context diff (hero) ── */
    .context-diff {
      margin-bottom: 40px;
    }

    .no-diff {
      padding: 20px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      color: #166534;
      font-size: 13px;
      font-weight: 500;
    }

    .diff-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      overflow: hidden;
    }
    .diff-table thead th {
      padding: 12px 16px;
      background: #fafafa;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-align: left;
      border-bottom: 1px solid #e5e5e5;
    }
    .diff-table thead th:first-child { width: 180px; color: #555; }
    .diff-table thead .col-a { color: #555; }
    .diff-table thead .col-b { color: #555; }

    .diff-table tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
    }
    .diff-table tbody tr:last-child td { border-bottom: none; }

    .diff-key {
      font-weight: 600;
      font-size: 13px;
      color: #333;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .diff-val {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 5px;
      display: inline-block;
    }
    .diff-val-a { background: #fff1f1; color: #b91c1c; }
    .diff-val-b { background: #f0fdf4; color: #166534; }

    /* ── Summary boxes ── */
    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }
    .summary-box {
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 18px 20px;
    }
    .summary-box .label { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px; }
    .summary-box .value { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .summary-box .sub { font-size: 11px; color: #aaa; margin-top: 4px; }
    .positive { color: #ef4444; }   /* more cost/steps = bad */
    .negative { color: #16a34a; }   /* fewer = good */
    .neutral  { color: #888; }

    /* ── Steps comparison ── */
    .steps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .steps-col h3 {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e5e5e5;
    }

    .step-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #e5e5e5;
      border-radius: 7px;
      margin-bottom: 8px;
    }
    .step-row.extra {
      border-color: #fca5a5;
      background: #fff5f5;
    }
    .step-num {
      font-size: 11px;
      color: #aaa;
      font-weight: 600;
      min-width: 22px;
      padding-top: 1px;
    }
    .step-info { flex: 1; }
    .step-name { font-weight: 500; font-size: 13px; margin-bottom: 4px; }
    .step-meta { display: flex; gap: 10px; font-size: 11px; color: #888; }
    .type-badge {
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
      background: #f0f0f0;
      color: #555;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .step-row.extra .type-badge { background: #fee2e2; color: #991b1b; }
    .extra-tag {
      font-size: 10px;
      font-weight: 700;
      color: #ef4444;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
      padding-top: 2px;
    }
    .empty-steps { color: #bbb; font-style: italic; font-size: 13px; padding: 8px 0; }

    .error-msg {
      color: #c00; padding: 16px; background: #fff5f5;
      border: 1px solid #fcc; border-radius: 6px;
    }
    .loading { color: #aaa; padding: 60px 0; text-align: center; }
  </style>
</head>
<body>

<header>
  <a href="index.html">← Runs</a>
  <span class="sep">/</span>
  <h1>Compare runs</h1>
</header>

<main id="main">
  <div class="loading">Loading…</div>
</main>

<script>
  const API = window.location.origin;
  const params = new URLSearchParams(location.search);
  const runA = params.get('run_a');
  const runB = params.get('run_b');

  async function load() {
    const main = document.getElementById('main');
    if (!runA || !runB) {
      main.innerHTML = '<div class="error-msg">Missing run_a or run_b parameters.</div>';
      return;
    }

    try {
      const res = await fetch(`${API}/runs/compare?run_a=${runA}&run_b=${runB}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      const { run_a, run_b, context_diff, cost_diff, token_diff } = data;
      const stepDiff = (run_b.steps?.length ?? 0) - (run_a.steps?.length ?? 0);
      const durDiff = (run_b.duration_ms ?? 0) - (run_a.duration_ms ?? 0);

      // Names in run A and B for matching
      const namesA = new Set((run_a.steps || []).map(s => s.name));
      const namesB = new Set((run_b.steps || []).map(s => s.name));

      // ── Context diff ──
      const diffEntries = Object.entries(context_diff || {});
      let diffHtml;
      if (diffEntries.length === 0) {
        diffHtml = '<div class="no-diff">No context differences — both runs used identical configuration.</div>';
      } else {
        const rows = diffEntries.map(([key, vals]) => `
          <tr>
            <td class="diff-key">${esc(key)}</td>
            <td><span class="diff-val diff-val-a">${esc(JSON.stringify(vals.run_a))}</span></td>
            <td><span class="diff-val diff-val-b">${esc(JSON.stringify(vals.run_b))}</span></td>
          </tr>`).join('');
        diffHtml = `
          <table class="diff-table">
            <thead>
              <tr>
                <th>Key</th>
                <th class="col-a">Run A &nbsp;<span style="font-weight:400;color:#bbb;font-family:monospace;font-size:11px">${run_a.id.slice(0,8)}</span></th>
                <th class="col-b">Run B &nbsp;<span style="font-weight:400;color:#bbb;font-family:monospace;font-size:11px">${run_b.id.slice(0,8)}</span></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      }

      // ── Summary boxes ──
      function diffClass(val, higherIsBad = true) {
        if (val === 0) return 'neutral';
        return (val > 0) === higherIsBad ? 'positive' : 'negative';
      }
      function fmtSigned(val, decimals = 0) {
        const sign = val > 0 ? '+' : '';
        return `${sign}${decimals > 0 ? val.toFixed(decimals) : val}`;
      }

      const summaryHtml = `
        <div class="summary-box">
          <div class="label">Steps</div>
          <div class="value ${diffClass(stepDiff)}">${fmtSigned(stepDiff)}</div>
          <div class="sub">${run_a.steps?.length ?? 0} vs ${run_b.steps?.length ?? 0}</div>
        </div>
        <div class="summary-box">
          <div class="label">Cost</div>
          <div class="value ${diffClass(cost_diff)}">$${fmtSigned(cost_diff, 4)}</div>
          <div class="sub">$${run_a.total_cost.toFixed(4)} vs $${run_b.total_cost.toFixed(4)}</div>
        </div>
        <div class="summary-box">
          <div class="label">Tokens</div>
          <div class="value ${diffClass(token_diff)}">${fmtSigned(token_diff)}</div>
          <div class="sub">${run_a.total_tokens.toLocaleString()} vs ${run_b.total_tokens.toLocaleString()}</div>
        </div>
        <div class="summary-box">
          <div class="label">Duration</div>
          <div class="value ${diffClass(durDiff)}">${fmtSigned(Math.round(durDiff / 1000), 1)}s</div>
          <div class="sub">${fmtDuration(run_a.duration_ms)} vs ${fmtDuration(run_b.duration_ms)}</div>
        </div>
      `;

      // ── Steps columns ──
      function renderSteps(steps, otherNames) {
        if (!steps || steps.length === 0) return '<div class="empty-steps">No steps</div>';
        return steps.map(step => {
          const isExtra = !otherNames.has(step.name);
          return `
            <div class="step-row${isExtra ? ' extra' : ''}">
              <span class="step-num">#${step.sequence}</span>
              <div class="step-info">
                <div class="step-name">${esc(step.name)}</div>
                <div class="step-meta">
                  <span class="type-badge">${esc(step.step_type)}</span>
                  <span>$${(step.cost ?? 0).toFixed(4)}</span>
                  <span>${(step.tokens ?? 0).toLocaleString()} tok</span>
                </div>
              </div>
              ${isExtra ? '<span class="extra-tag">Extra</span>' : ''}
            </div>`;
        }).join('');
      }

      const stepsHtml = `
        <div class="steps-grid">
          <div class="steps-col">
            <h3>Run A &nbsp;<span style="font-weight:400;opacity:.5;font-family:monospace">${run_a.id.slice(0,8)}</span></h3>
            ${renderSteps(run_a.steps, namesB)}
          </div>
          <div class="steps-col">
            <h3>Run B &nbsp;<span style="font-weight:400;opacity:.5;font-family:monospace">${run_b.id.slice(0,8)}</span></h3>
            ${renderSteps(run_b.steps, namesA)}
          </div>
        </div>
      `;

      main.innerHTML = `
        <div class="context-diff">
          <div class="section-label">Context diff</div>
          ${diffHtml}
        </div>

        <div style="margin-bottom:40px">
          <div class="section-label">Summary</div>
          <div class="summary">${summaryHtml}</div>
        </div>

        <div>
          <div class="section-label">Steps</div>
          ${stepsHtml}
        </div>
      `;
    } catch (e) {
      main.innerHTML = `<div class="error-msg">Failed to load comparison.<br><small>${e.message}</small></div>`;
    }
  }

  function fmtDuration(ms) {
    if (ms == null) return '—';
    if (ms < 1000) return `${ms}ms`;
    return `${(ms / 1000).toFixed(1)}s`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  load();
</script>
</body>
</html>
